<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WildHermes – Ruokaa suoraan tuottajalta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
    .logo-font { font-family: 'Playfair Display', serif; }
    #map { height: 520px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .leaflet-popup-content-wrapper { border-radius: 16px; }
    .leaflet-popup-tip { background: white; }
  </style>
</head>
<body class="bg-emerald-50">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl">🌾</div>
        <h1 class="logo-font text-3xl font-bold text-emerald-800">WildHermes</h1>
      </div>
      <div class="flex gap-8 text-lg">
        <a href="#map" class="hover:text-emerald-600">Kartta</a>
        <a href="#tuotteet" class="hover:text-emerald-600">Tuotteet</a>
        <a href="producers.html" class="hover:text-emerald-600">Kaikki tuottajat</a>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleCart()" class="relative text-2xl">
          🛒 <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
        <button onclick="showRegisterModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-medium">Kirjaudu</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="bg-emerald-700 text-white py-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-5xl md:text-6xl font-bold logo-font mb-6">Löydä tuottajat kartalta</h2>
      <p class="text-xl max-w-xl mx-auto">Klikkaa markereita → näet tarjoukset ja voit tilata suoraan</p>
    </div>
  </header>

  <!-- KARTTA -->
  <section id="map" class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold text-center mb-4">Tuottajat lähelläsi</h2>
    <p class="text-center text-emerald-700 mb-8">Zoomaa ja klikkaa – reaaliaikainen kartta</p>
    <div id="mapContainer"></div>
  </section>

  <!-- TUOTELISTA (sama kuin ennen) -->
  <section id="tuotteet" class="max-w-7xl mx-auto px-6 py-16 bg-white">
    <h2 class="text-4xl font-bold text-center mb-10">Tuoreet tuotteet juuri nyt</h2>
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

  <!-- TUOTTAJAN DETAIL MODAL -->
  <div id="producerModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8 max-h-[90vh] overflow-auto">
      <button onclick="closeModal()" class="float-right text-3xl text-gray-400 hover:text-gray-600">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    tailwind.config = { content: ["./**/*.{html,js}"] };

    let map, cart = [];

    const producers = [
      {
        id: 1,
        lat: 60.1699, lng: 24.9384,
        name: "Helsingin Marjatila",
        location: "Espoo, 12 km päässä",
        emoji: "🍓",
        products: "Tuoreet mansikat, mustikat, vadelmat",
        desc: "Pieni perhetila Espoossa. Kaikki marjat poimittu samana päivänä. Toimitus tai nouto tilalta.",
        priceExample: "Mansikat 1kg → 6,90 €"
      },
      {
        id: 2,
        lat: 60.4518, lng: 22.2666,
        name: "Turun Luomukana",
        location: "Turku, 45 km päässä",
        emoji: "🐔",
        products: "Luomumunat, broileri, kana",
        desc: "Sertifioitu luomutila. Munat kerätään joka aamu. Myös lihapaketteja tilauksesta.",
        priceExample: "12 luomumunaa → 4,50 €"
      },
      {
        id: 3,
        lat: 61.4991, lng: 23.7664,
        name: "Tampereen Juusto",
        location: "Tampere, 8 km päässä",
        emoji: "🧀",
        products: "Tuore leipäjuusto, halloumi, jugurtti",
        desc: "Perinteinen juustola. Kaikki maidot paikallisilta tiloilta.",
        priceExample: "400g leipäjuusto → 5,80 €"
      },
      {
        id: 4,
        lat: 65.0121, lng: 25.4651,
        name: "Oulun Vihannes",
        location: "Oulu, 22 km päässä",
        emoji: "🥕",
        products: "Perunat, porkkanat, sipulit",
        desc: "Suuri vihannestila Pohjois-Suomessa. Kausituotteet suoraan pellolta.",
        priceExample: "2kg uudet perunat → 3,90 €"
      }
    ];

    function initMap() {
      map = L.map('mapContainer').setView([64.0, 25.0], 6);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      producers.forEach(p => {
        const marker = L.marker([p.lat, p.lng], {
          riseOnHover: true
        }).addTo(map);

        marker.bindPopup(`
          <div class="text-center">
            <div class="text-5xl mb-2">${p.emoji}</div>
            <b class="text-lg">${p.name}</b><br>
            <span class="text-emerald-600">${p.location}</span><br><br>
            <b>${p.products}</b><br>
            <small>${p.priceExample}</small><br><br>
            <button onclick="showProducerDetail(${p.id}); map.closePopup();" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-2xl text-sm w-full">
              Avaa profiili & tilaa
            </button>
          </div>
        `);
      });
    }

    function showProducerDetail(id) {
      const p = producers.find(x => x.id === id);
      if (!p) return;

      document.getElementById('modalContent').innerHTML = `
        <div class="text-center">
          <div class="text-7xl mb-4">${p.emoji}</div>
          <h2 class="text-3xl font-bold">${p.name}</h2>
          <p class="text-emerald-700">${p.location}</p>
          <div class="my-6 bg-emerald-50 p-6 rounded-2xl text-left">
            <p class="font-medium">${p.products}</p>
            <p class="mt-3 text-gray-600">${p.desc}</p>
          </div>
          <p class="font-bold text-xl mb-6">${p.priceExample}</p>
          
          <button onclick="addProducerToCart('${p.name}')" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl text-lg font-medium">
            Lisää tuotteita koriin
          </button>
        </div>
      `;
      document.getElementById('producerModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('producerModal').classList.add('hidden');
    }

    function addProducerToCart(name) {
      alert(`✅ ${name} tuotteet lisätty koriin!\n\nVoit jatkaa tilausta ostoskorista.`);
      cart.push({name});
      document.getElementById('cartCount').textContent = cart.length;
      closeModal();
    }

    // Tuotelista (lyhennetty)
    const products = [ /* sama kuin edellisessä viestissä */ ];
    function renderProducts() { /* sama koodi kuin edellisessä */ }

    function toggleCart() { /* sama kuin ennen */ }

    function showRegisterModal() {
      alert("Rekisteröinti aukeaa täällä (demo). Tervetuloa WildHermesiin! 🌱");
    }

    window.onload = () => {
      initMap();
      renderProducts();   // Lisää tarvittaessa tuotteet
    };
  </script>
</body>
</html>
