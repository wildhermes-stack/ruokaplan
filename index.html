<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WildHermes – Ruokaa suoraan tuottajalta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
    .logo-font { font-family: 'Playfair Display', serif; }
    #map { height: 480px; border-radius: 12px; }
  </style>
</head>
<body class="bg-emerald-50">

  <!-- Navigointi (sama kuin ennen) -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl">🌾</div>
        <h1 class="logo-font text-3xl font-bold text-emerald-800">WildHermes</h1>
      </div>
      <div class="flex gap-8">
        <a href="index.html" class="hover:text-emerald-600">Etusivu</a>
        <a href="#tuotteet" class="hover:text-emerald-600">Tuotteet</a>
        <a href="producers.html" class="hover:text-emerald-600">Tuottajat</a>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleCart()" class="relative">
          🛒 <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
        <button onclick="showRegisterModal()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl">Kirjaudu</button>
      </div>
    </div>
  </nav>

  <!-- Hero + Kartta (lyhennetty) -->
  <!-- ... (voit kopioida edellisestä versiosta) ... -->

  <!-- TUOTELISTA -->
  <section id="tuotteet" class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold text-center mb-10">Tuoreet tuotteet juuri nyt</h2>
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

  <script>
    // Mock tuotteet
    const products = [
      { id:1, name:"Tuore mansikat 1kg", producer:"Helsingin Marjatila", price:6.90, unit:"kg", img:"🍓" },
      { id:2, name:"Luomumunat 12 kpl", producer:"Turun Luomukana", price:4.50, unit:"kpl", img:"🥚" },
      { id:3, name:"Tuore leipäjuusto 400g", producer:"Tampereen Juusto", price:5.80, unit:"pkt", img:"🧀" },
      { id:4, name:"Uudet perunat 2kg", producer:"Oulun Vihannes", price:3.90, unit:"kg", img:"🥔" }
    ];

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => `
        <div class="bg-white rounded-3xl overflow-hidden shadow hover:shadow-xl transition">
          <div class="h-48 bg-emerald-100 flex items-center justify-center text-6xl">${p.img}</div>
          <div class="p-6">
            <h3 class="font-bold">${p.name}</h3>
            <p class="text-emerald-700 text-sm">${p.producer}</p>
            <div class="flex justify-between items-end mt-4">
              <div>
                <span class="text-2xl font-bold">${p.price} €</span>
                <span class="text-sm text-gray-500">/${p.unit}</span>
              </div>
              <button onclick="addToCart(${p.id})" 
                      class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-2xl text-sm">
                Lisää koriin
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Ostoskori
    let cart = [];
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      document.getElementById('cartCount').textContent = cart.length;
      alert(`${product.name} lisätty koriin!`);
    }

    function toggleCart() {
      if (cart.length === 0) {
        alert("Kori on tyhjä");
        return;
      }
      let summary = "🛒 Ostoskori:\n\n";
      let total = 0;
      cart.forEach(item => {
        summary += `${item.name} – ${item.price} €\n`;
        total += item.price;
      });
      summary += `\nYhteensä: ${total.toFixed(2)} €\n\nHaluatko siirtyä kassalle?`;
      if (confirm(summary)) {
        alert("✅ Tilaus vahvistettu! (Tämä on demo – oikeassa versiossa mennään maksuun)");
        cart = [];
        document.getElementById('cartCount').textContent = 0;
      }
    }

    window.onload = () => {
      renderProducts();
      // initMap() jos haluat kartan tähän
    };
  </script>
</body>
</html>
